<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedDispatch</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#222536;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);
  --text:#e8eaf0;--text2:#8b90a8;--text3:#555a72;
  --accent:#4f8ef7;--accent2:#2d5fc7;
  --green:#22c97a;--amber:#f5a623;--red:#f04e4e;
  --purple:#a78bfa;--teal:#2dd4bf;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{display:flex;align-items:center;padding:0 14px;height:50px;background:var(--bg2);border-bottom:1px solid var(--border);gap:10px;flex-shrink:0}
.logo{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--accent);text-transform:uppercase}
.event-chip{font-size:11px;color:var(--text2);background:var(--bg3);padding:4px 10px;border-radius:4px;border:1px solid var(--border);cursor:pointer;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.event-chip:hover{border-color:var(--border2)}
.tab{background:transparent;border:1px solid transparent;color:var(--text2);padding:5px 11px;border-radius:4px;font-size:12px;cursor:pointer;font-weight:500;transition:all .15s}
.tab:hover{color:var(--text);border-color:var(--border)}
.tab.on{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.clock{margin-left:auto;font-family:var(--mono);font-size:13px;color:var(--text2)}

/* LAYOUT */
.main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.panel-hdr{padding:9px 12px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-scroll{overflow-y:auto;flex:1;padding:6px}

/* UNIT CARDS */
.uc{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin-bottom:5px;cursor:default;transition:border-color .15s}
.uc:hover{border-color:var(--border2)}
.uc-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
.uc-cs{font-family:var(--mono);font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px}
.badge{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:3px}
.uc-meta{font-size:11px;color:var(--text2);margin-top:3px}
.uc-break{font-family:var(--mono);font-size:10px;color:var(--amber);margin-top:2px}

/* STATUS */
.s-available{background:rgba(34,201,122,.15);color:var(--green)}
.s-posted{background:rgba(79,142,247,.15);color:var(--accent)}
.s-responding{background:rgba(245,166,35,.2);color:var(--amber)}
.s-onscene{background:rgba(240,78,78,.2);color:var(--red)}
.s-transporting{background:rgba(167,139,250,.2);color:var(--purple)}
.s-clinic{background:rgba(45,212,191,.2);color:var(--teal)}
.s-break{background:rgba(245,166,35,.12);color:var(--amber)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.dg{background:var(--green)}.db{background:var(--accent)}.da{background:var(--amber)}
.dr{background:var(--red)}.dp{background:var(--purple)}.dt{background:var(--teal)}.d0{background:var(--text3)}

/* VIEWS */
.view{display:none;flex:1;overflow:hidden;flex-direction:column}
.view.on{display:flex}

/* BOARD */
.board-bar{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap}
.zpill{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:3px 10px;border-radius:20px;font-size:11px;cursor:pointer;transition:all .1s}
.zpill:hover{border-color:var(--border2)}
.zpill.on{background:var(--accent2);border-color:var(--accent);color:#fff}
.board-scroll{overflow-y:auto;flex:1;padding:10px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:8px}

/* POST CARDS */
.pc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .15s}
.pc:hover{border-color:var(--border2)}
.pc.has-unit{border-color:rgba(79,142,247,.3)}
.pc-hdr{display:flex;align-items:center;padding:7px 10px;background:var(--bg3);border-bottom:1px solid var(--border);gap:6px}
.pc-name{font-family:var(--mono);font-size:11px;font-weight:700;flex:1;color:var(--text)}
.pc-zone{font-size:10px;color:var(--text3);background:var(--bg);padding:2px 7px;border-radius:3px;border:1px solid var(--border)}
.pc-body{padding:8px 10px;min-height:52px}
.pc-empty{font-size:11px;color:var(--text3);padding:6px 0;display:flex;align-items:center;gap:5px}
.pu{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:7px 9px;margin-bottom:5px}
.pu-top{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.pu-cs{font-family:var(--mono);font-size:12px;font-weight:700;flex:1}
.sc{display:flex;flex-wrap:wrap;gap:3px}
.sb{background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:3px 7px;border-radius:3px;font-size:10px;cursor:pointer;font-weight:500;transition:all .1s}
.sb:hover{border-color:var(--border2);color:var(--text)}
.sb.on-responding{background:rgba(245,166,35,.2);color:var(--amber);border-color:var(--amber)}
.sb.on-onscene{background:rgba(240,78,78,.2);color:var(--red);border-color:var(--red)}
.sb.on-transporting{background:rgba(167,139,250,.2);color:var(--purple);border-color:var(--purple)}
.sb.on-clinic{background:rgba(45,212,191,.2);color:var(--teal);border-color:var(--teal)}
.sb.on-posted{background:rgba(34,201,122,.12);color:var(--green);border-color:var(--green)}
.sb.on-break{background:rgba(245,166,35,.15);color:var(--amber);border-color:var(--amber)}
.xbtn{background:transparent;border:none;color:var(--text3);cursor:pointer;padding:2px;border-radius:3px;display:flex;align-items:center;font-size:15px;line-height:1;transition:color .15s}
.xbtn:hover{color:var(--red)}
.assign-row{padding:5px 8px 8px;border-top:1px solid var(--border)}
.asel{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text2);font-size:11px;padding:4px 6px;width:100%;outline:none;cursor:pointer}
.asel:focus{border-color:var(--accent)}

/* RIGHT PANEL */
.rpanel{width:230px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.call-card{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:6px;padding:8px 10px;margin-bottom:6px}
.call-card.ph{border-left-color:var(--red)}
.call-card.pm{border-left-color:var(--amber)}
.call-card.pl{border-left-color:var(--green)}
.call-type{font-size:11px;font-weight:600;margin-bottom:2px}
.call-loc{font-size:10px;color:var(--text2);margin-bottom:4px}
.call-units{font-size:10px;color:var(--accent);font-family:var(--mono)}
.call-res{font-size:10px;color:var(--purple);margin-top:2px}
.call-time{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.res-section{border-top:1px solid var(--border);padding:8px}
.res-lbl{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.res-item{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text2);padding:3px 0}

/* BUTTONS */
.btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:5px 11px;border-radius:4px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--border2);color:var(--text)}
.btn.primary{background:var(--accent2);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent)}
.btn.danger:hover{border-color:var(--red);background:rgba(240,78,78,.1);color:var(--red)}
.ibtn{background:transparent;border:none;color:var(--text3);cursor:pointer;padding:2px 4px;border-radius:3px;font-size:14px;display:inline-flex;align-items:center;transition:color .15s}
.ibtn:hover{color:var(--text2)}

/* SETUP */
.setup-wrap{padding:16px;overflow-y:auto;flex:1}
.setup-sec{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:14px}
.setup-sec-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.si{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:7px 10px;margin-bottom:5px}
.si-name{flex:1;font-size:12px;color:var(--text)}
.si-meta{font-size:11px;color:var(--text2)}
.qa{display:flex;gap:6px;margin-top:8px;align-items:center}

/* LOG */
.log-item{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.log-time{font-family:var(--mono);color:var(--text3);flex-shrink:0}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:999}
.overlay.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:18px;width:400px;max-width:95vw;max-height:85vh;overflow-y:auto}
.modal-title{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.fg{margin-bottom:11px}
.fl{font-size:11px;color:var(--text2);margin-bottom:3px;display:block}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:13px;padding:7px 10px;outline:none}
.fi:focus{border-color:var(--accent)}
.fr{display:flex;gap:8px}
.fr .fg{flex:1}
select.fi option{background:var(--bg3)}

/* SCROLLBARS */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulsing{animation:pulse 2s infinite}

@media(max-width:680px){.sidebar{display:none}.rpanel{display:none}.pgrid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">MedDispatch</span>
  <span class="event-chip" id="eventChip" onclick="showTab('setup',this)">Set event name →</span>
  <button class="tab on" onclick="showTab('board',this)">Board</button>
  <button class="tab" onclick="showTab('setup',this)">Setup</button>
  <button class="tab" onclick="showTab('log',this)">Log</button>
  <span class="clock" id="clock">--:--:--</span>
</div>

<div class="main">

<!-- UNITS SIDEBAR -->
<div class="sidebar">
  <div class="panel-hdr">
    Units <span id="uCount" style="color:var(--text2);margin-left:4px">0</span>
    <button class="ibtn" onclick="openModal('addUnit')" title="Add unit">＋</button>
  </div>
  <div class="panel-scroll" id="unitSidebar"></div>
</div>

<!-- BOARD VIEW -->
<div class="view on" id="view-board">
  <div class="board-bar">
    <div id="zonePills" style="display:flex;gap:4px;flex-wrap:wrap"></div>
    <div style="margin-left:auto;display:flex;gap:6px">
      <button class="btn" onclick="openModal('addPost')">＋ Post</button>
      <button class="btn primary" onclick="openModal('addCall')">⚠ Call</button>
    </div>
  </div>
  <div class="board-scroll"><div class="pgrid" id="pgrid"></div></div>
</div>

<!-- SETUP VIEW -->
<div class="view" id="view-setup">
  <div class="setup-wrap">
    <div class="setup-sec">
      <div class="setup-sec-title">Event</div>
      <div class="fr">
        <div class="fg"><label class="fl">Event name</label><input class="fi" id="s-evName" placeholder="Festival name"></div>
        <div class="fg"><label class="fl">Date</label><input class="fi" type="date" id="s-evDate"></div>
      </div>
      <button class="btn primary" onclick="saveEvent()" style="margin-top:8px">Save event</button>
    </div>
    <div class="setup-sec">
      <div class="setup-sec-title">Units / teams</div>
      <div id="s-unitList"></div>
      <div class="qa">
        <input class="fi" id="s-cs" placeholder="Callsign e.g. MED-1" style="font-size:12px;padding:6px 9px">
        <input class="fi" id="s-uname" placeholder="Team name (opt)" style="font-size:12px;padding:6px 9px">
        <button class="btn primary" onclick="addUnit()">＋</button>
      </div>
    </div>
    <div class="setup-sec">
      <div class="setup-sec-title">Post locations</div>
      <div id="s-postList"></div>
      <div class="qa">
        <input class="fi" id="s-pname" placeholder="Post name e.g. Main Stage Left" style="font-size:12px;padding:6px 9px">
        <input class="fi" id="s-pzone" placeholder="Zone" style="font-size:12px;padding:6px 9px;width:110px">
        <button class="btn primary" onclick="addPost()">＋</button>
      </div>
    </div>
    <div class="setup-sec">
      <div class="setup-sec-title">Resources</div>
      <div id="s-resList"></div>
      <div class="qa">
        <input class="fi" id="s-rname" placeholder="Resource name" style="font-size:12px;padding:6px 9px">
        <input class="fi" id="s-rqty" type="number" min="1" placeholder="Qty" style="font-size:12px;padding:6px 9px;width:60px">
        <input class="fi" id="s-rloc" placeholder="Location" style="font-size:12px;padding:6px 9px">
        <button class="btn primary" onclick="addResource()">＋</button>
      </div>
    </div>
  </div>
</div>

<!-- LOG VIEW -->
<div class="view" id="view-log">
  <div style="padding:12px;flex:1;overflow-y:auto">
    <div style="font-size:11px;color:var(--text2);margin-bottom:10px">Activity log (newest first)</div>
    <div id="logList"></div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="rpanel">
  <div class="panel-hdr">
    Calls <span id="callCount" style="color:var(--text2);margin-left:4px">0</span>
    <button class="ibtn" onclick="openModal('addCall')" title="Log call">＋</button>
  </div>
  <div class="panel-scroll" id="callPanel" style="flex:1"></div>
  <div class="res-section">
    <div class="res-lbl">Resources</div>
    <div id="resPanel"></div>
  </div>
</div>

</div><!-- /main -->

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="mTitle">–<button class="ibtn" onclick="closeModal()" style="font-size:16px">✕</button></div>
    <div id="mBody"></div>
    <div id="mFoot" style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px"></div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────
let S = {
  event:{name:'',date:''},
  units:[],posts:[],resources:[],calls:[],log:[],
  zones:[]
};
let activeZone='ALL';

// ── PERSIST ────────────────────────────────────────────
function save(){try{localStorage.setItem('mdd2',JSON.stringify(S))}catch(e){}}
function load(){try{const d=localStorage.getItem('mdd2');if(d)S={...S,...JSON.parse(d)}}catch(e){}}

// ── CLOCK ──────────────────────────────────────────────
function tick(){
  const n=new Date();
  document.getElementById('clock').textContent=
    n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
}
setInterval(tick,1000);tick();

// Break timers update every 30s
setInterval(()=>{if(S.units.some(u=>u.status==='break'))renderSidebar()},30000);

// ── TABS ──────────────────────────────────────────────
function showTab(v,btn){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('on'));
  document.getElementById('view-'+v).classList.add('on');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  if(v==='setup')renderSetup();
  if(v==='log')renderLog();
  if(v==='board')renderBoard();
}

// ── LOG ───────────────────────────────────────────────
const LC={info:'var(--text2)',warn:'var(--amber)',call:'var(--red)',move:'var(--accent)'};
function addLog(msg,type='info'){
  const n=new Date();
  const t=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  S.log.unshift({time:t,msg,type});
  if(S.log.length>300)S.log.pop();
}
function renderLog(){
  document.getElementById('logList').innerHTML=S.log.map(l=>
    `<div class="log-item"><span class="log-time">${l.time}</span><span style="color:${LC[l.type]||'var(--text2)'}">${l.msg}</span></div>`
  ).join('');
}

// ── HELPERS ───────────────────────────────────────────
function gu(id){return S.units.find(u=>u.id===id)}
function gp(id){return S.posts.find(p=>p.id===id)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}

const SM={
  available:{label:'Available',dc:'dg',bc:'s-available'},
  posted:   {label:'Posted',   dc:'db',bc:'s-posted'},
  responding:{label:'Responding',dc:'da',bc:'s-responding'},
  onscene:  {label:'On Scene', dc:'dr',bc:'s-onscene'},
  transporting:{label:'Transport',dc:'dp',bc:'s-transporting'},
  clinic:   {label:'Clinic',   dc:'dt',bc:'s-clinic'},
  break:    {label:'Break',    dc:'da',bc:'s-break'},
};

// ── UNITS ─────────────────────────────────────────────
function addUnit(){
  const cs=document.getElementById('s-cs').value.trim();
  if(!cs)return;
  const name=document.getElementById('s-uname').value.trim();
  S.units.push({id:uid(),callsign:cs,name,status:'available',postId:null,breakStart:null,postHistory:[]});
  document.getElementById('s-cs').value='';
  document.getElementById('s-uname').value='';
  addLog(`Unit added: ${cs}`);
  save();renderAll();
}
function removeUnit(id){
  const u=gu(id);if(!u)return;
  unassign(id);
  S.units=S.units.filter(u=>u.id!==id);
  addLog(`Unit removed: ${u.callsign}`,'warn');
  save();renderAll();
}
function setStatus(uid,status){
  const u=gu(uid);if(!u)return;
  const prev=u.status;
  u.status=status;
  if(status==='break'){u.breakStart=Date.now();addLog(`${u.callsign} → Break`,'warn')}
  else{
    if(prev==='break')u.breakStart=null;
    if(status==='available'){unassign(uid);addLog(`${u.callsign} → Available`,'move')}
    else addLog(`${u.callsign} → ${SM[status]?.label||status}`);
  }
  save();renderAll();
}
function unassign(uid){
  const u=gu(uid);if(!u)return;
  if(u.postId){const p=gp(u.postId);if(p)p.unitIds=(p.unitIds||[]).filter(i=>i!==uid)}
  u.postId=null;
  if(u.status==='posted')u.status='available';
}
function assignToPost(uid,postId){
  const u=gu(uid),p=gp(postId);if(!u||!p)return;
  if(u.postId===postId)return;
  if(u.postId){const op=gp(u.postId);if(op)op.unitIds=(op.unitIds||[]).filter(i=>i!==uid)}
  u.postId=postId;u.status='posted';
  p.unitIds=p.unitIds||[];
  if(!p.unitIds.includes(uid))p.unitIds.push(uid);
  const t=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
  u.postHistory=u.postHistory||[];
  u.postHistory.push({postId,postName:p.name,time:t});
  addLog(`${u.callsign} → Post: ${p.name}`,'move');
  save();renderAll();
}

// ── POSTS ─────────────────────────────────────────────
function addPost(){
  const name=document.getElementById('s-pname').value.trim();if(!name)return;
  const zone=document.getElementById('s-pzone').value.trim()||'General';
  S.posts.push({id:uid(),name,zone,unitIds:[]});
  document.getElementById('s-pname').value='';
  document.getElementById('s-pzone').value='';
  updateZones();addLog(`Post added: ${name}`);save();renderAll();
}
function removePost(id){
  const p=gp(id);if(!p)return;
  (p.unitIds||[]).forEach(uid=>{const u=gu(uid);if(u){u.postId=null;if(u.status==='posted')u.status='available'}});
  S.posts=S.posts.filter(p=>p.id!==id);
  updateZones();addLog(`Post removed: ${p.name}`,'warn');save();renderAll();
}
function updateZones(){S.zones=[...new Set(S.posts.map(p=>p.zone))].filter(Boolean)}

// ── RESOURCES ─────────────────────────────────────────
function addResource(){
  const name=document.getElementById('s-rname').value.trim();if(!name)return;
  const qty=parseInt(document.getElementById('s-rqty').value)||1;
  const loc=document.getElementById('s-rloc').value.trim();
  S.resources.push({id:uid(),name,total:qty,available:qty,location:loc});
  document.getElementById('s-rname').value='';
  document.getElementById('s-rqty').value='';
  document.getElementById('s-rloc').value='';
  addLog(`Resource added: ${name} x${qty}`);save();renderAll();
}
function removeResource(id){S.resources=S.resources.filter(r=>r.id!==id);save();renderAll()}

// ── CALLS ─────────────────────────────────────────────
function resolveCall(id){
  const c=S.calls.find(c=>c.id===id);if(!c)return;
  (c.resources||[]).forEach(r=>{const res=S.resources.find(x=>x.id===r.id);if(res)res.available=Math.min(res.total,res.available+r.qty)});
  S.calls=S.calls.filter(c=>c.id!==id);
  addLog(`Call resolved: ${c.type} @ ${c.location}`);save();renderAll();
}

// ── RENDER ALL ────────────────────────────────────────
function renderAll(){
  renderSidebar();renderBoard();renderCalls();renderResources();
  document.getElementById('uCount').textContent=S.units.length;
  document.getElementById('callCount').textContent=S.calls.length;
  if(S.event.name)document.getElementById('eventChip').textContent='⚡ '+S.event.name;
}

function renderSidebar(){
  const el=document.getElementById('unitSidebar');
  if(!S.units.length){el.innerHTML='<div style="font-size:11px;color:var(--text3);padding:12px;text-align:center">Add units in Setup</div>';return}
  el.innerHTML=S.units.map(u=>{
    const sm=SM[u.status]||SM.available;
    const post=u.postId?gp(u.postId):null;
    let brk='';
    if(u.status==='break'&&u.breakStart){
      const m=Math.floor((Date.now()-u.breakStart)/60000);
      brk=`<div class="uc-break pulsing">⏱ ${m}m on break</div>`;
    }
    return `<div class="uc">
      <div class="uc-top">
        <span class="uc-cs"><span class="dot ${sm.dc}"></span>${u.callsign}</span>
        <span class="badge ${sm.bc}">${sm.label}</span>
      </div>
      <div class="uc-meta">${post?post.name:(u.name||'–')}</div>
      ${brk}
    </div>`;
  }).join('');
}

function renderBoard(){
  // Zone pills
  updateZones();
  const zp=document.getElementById('zonePills');
  zp.innerHTML=`<span class="zpill ${activeZone==='ALL'?'on':''}" data-z="ALL" onclick="setZone(this)">All zones</span>`+
    S.zones.map(z=>`<span class="zpill ${activeZone===z?'on':''}" data-z="${z}" onclick="setZone(this)">${z}</span>`).join('');

  const posts=activeZone==='ALL'?S.posts:S.posts.filter(p=>p.zone===activeZone);
  const grid=document.getElementById('pgrid');
  if(!posts.length){
    grid.innerHTML='<div style="grid-column:1/-1;font-size:12px;color:var(--text3);padding:20px;text-align:center">No posts yet. Add one above →</div>';
    return;
  }
  grid.innerHTML=posts.map(p=>{
    const units=(p.unitIds||[]).map(id=>gu(id)).filter(Boolean);
    const unitsHtml=units.map(u=>{
      const sm=SM[u.status]||SM.posted;
      const statuses=[
        {k:'responding',l:'Responding'},{k:'onscene',l:'On Scene'},
        {k:'transporting',l:'Transport'},{k:'clinic',l:'Clinic'},
        {k:'posted',l:'Clear'},{k:'break',l:'Break'}
      ];
      return `<div class="pu">
        <div class="pu-top">
          <span class="dot ${sm.dc}"></span>
          <span class="pu-cs">${u.callsign}</span>
          <span class="badge ${sm.bc}">${sm.label}</span>
          <button class="xbtn" onclick="unassignAndRender('${u.id}')" title="Remove from post">✕</button>
        </div>
        <div class="sc">
          ${statuses.map(s=>`<button class="sb ${u.status===s.k?'on-'+s.k:''}" onclick="setStatus('${u.id}','${s.k}')">${s.l}</button>`).join('')}
        </div>
      </div>`;
    }).join('');
    const empty=units.length?'':'<div class="pc-empty">📍 Unoccupied</div>';
    const avail=S.units.filter(u=>(!u.postId||u.status==='available')&&!units.find(x=>x.id===u.id));
    const assignRow=avail.length?`<div class="assign-row">
      <select class="asel" onchange="assignFromSel(this,'${p.id}')">
        <option value="">Assign unit…</option>
        ${avail.map(u=>`<option value="${u.id}">${u.callsign}${u.name?' – '+u.name:''}</option>`).join('')}
      </select></div>`:'';
    return `<div class="pc ${units.length?'has-unit':''}">
      <div class="pc-hdr">
        <span class="pc-name">${p.name}</span>
        <span class="pc-zone">${p.zone}</span>
        <button class="ibtn" onclick="openEditPost('${p.id}')" style="font-size:13px" title="Edit">✎</button>
        <button class="ibtn" onclick="removePost('${p.id}')" title="Remove">🗑</button>
      </div>
      <div class="pc-body">${unitsHtml}${empty}</div>
      ${assignRow}
    </div>`;
  }).join('');
}

function setZone(el){
  activeZone=el.dataset.z;
  document.querySelectorAll('.zpill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  renderBoard();
}
function unassignAndRender(uid){
  const u=gu(uid);if(u){unassign(uid);addLog(`${u.callsign} removed from post`,'move');save();renderAll();}
}
function assignFromSel(sel,postId){
  const uid=sel.value;if(!uid)return;
  assignToPost(uid,postId);sel.value='';
}

function renderSetup(){
  const ul=document.getElementById('s-unitList');
  ul.innerHTML=S.units.map(u=>`<div class="si">
    <span class="dot ${SM[u.status]?.dc||'d0'}"></span>
    <span class="si-name">${u.callsign}${u.name?' — '+u.name:''}</span>
    <span class="si-meta">${SM[u.status]?.label||u.status}</span>
    <button class="ibtn" onclick="removeUnit('${u.id}')" title="Remove">🗑</button>
  </div>`).join('')||'<div style="font-size:11px;color:var(--text3);padding:4px">None yet</div>';

  const pl=document.getElementById('s-postList');
  pl.innerHTML=S.posts.map(p=>`<div class="si">
    <span>📍</span>
    <span class="si-name">${p.name}</span>
    <span class="si-meta">${p.zone}</span>
    <span class="si-meta" style="color:var(--accent)">${(p.unitIds||[]).length} unit(s)</span>
    <button class="ibtn" onclick="removePost('${p.id}')" title="Remove">🗑</button>
  </div>`).join('')||'<div style="font-size:11px;color:var(--text3);padding:4px">None yet</div>';

  const rl=document.getElementById('s-resList');
  rl.innerHTML=S.resources.map(r=>`<div class="si">
    <span>🔧</span>
    <span class="si-name">${r.name}</span>
    <span class="si-meta">${r.available}/${r.total} avail.</span>
    <span class="si-meta">${r.location||''}</span>
    <button class="ibtn" onclick="removeResource('${r.id}')" title="Remove">🗑</button>
  </div>`).join('')||'<div style="font-size:11px;color:var(--text3);padding:4px">None yet</div>';

  const en=document.getElementById('s-evName');if(en&&!en.value)en.value=S.event.name;
  const ed=document.getElementById('s-evDate');if(ed&&!ed.value)ed.value=S.event.date;
}

function saveEvent(){
  S.event.name=document.getElementById('s-evName').value.trim();
  S.event.date=document.getElementById('s-evDate').value;
  if(S.event.name)document.getElementById('eventChip').textContent='⚡ '+S.event.name;
  addLog(`Event set: ${S.event.name}`);save();
}

function renderCalls(){
  const el=document.getElementById('callPanel');
  if(!S.calls.length){el.innerHTML='<div style="font-size:11px;color:var(--text3);padding:12px;text-align:center">No active calls</div>';return}
  el.innerHTML=S.calls.map(c=>{
    const units=(c.unitIds||[]).map(id=>gu(id)).filter(Boolean);
    const ress=(c.resources||[]).map(r=>{const res=S.resources.find(x=>x.id===r.id);return res?`${r.qty}x ${res.name}`:''}).filter(Boolean);
    return `<div class="call-card p${c.priority||'m'}">
      <div class="call-type">${c.type}</div>
      <div class="call-loc">📍 ${c.location}</div>
      ${units.length?`<div class="call-units">${units.map(u=>u.callsign).join(', ')}</div>`:''}
      ${ress.length?`<div class="call-res">🔧 ${ress.join(', ')}</div>`:''}
      <div class="call-time">${c.time}</div>
      <div style="display:flex;gap:4px;margin-top:6px">
        <button class="btn" style="font-size:10px;padding:3px 8px" onclick="openAddToCall('${c.id}')">＋ Add</button>
        <button class="btn danger" style="font-size:10px;padding:3px 8px" onclick="resolveCall('${c.id}')">Resolve</button>
      </div>
    </div>`;
  }).join('');
}

function renderResources(){
  const el=document.getElementById('resPanel');
  if(!S.resources.length){el.innerHTML='<div style="font-size:11px;color:var(--text3)">None configured</div>';return}
  el.innerHTML=S.resources.map(r=>`
    <div class="res-item">
      <span>${r.name}</span>
      <span style="font-family:var(--mono);font-weight:700;color:${r.available===0?'var(--red)':r.available<r.total?'var(--amber)':'var(--green)'}">${r.available}/${r.total}</span>
    </div>
    ${r.location?`<div style="font-size:10px;color:var(--text3);margin-bottom:4px">📍 ${r.location}</div>`:''}`
  ).join('');
}

// ── MODALS ────────────────────────────────────────────
let currentModal='';
function openModal(type,arg){
  currentModal=type;
  const ov=document.getElementById('overlay');
  const title=document.getElementById('mTitle');
  const body=document.getElementById('mBody');
  const foot=document.getElementById('mFoot');

  const close=`<button class="ibtn" onclick="closeModal()" style="font-size:16px">✕</button>`;

  if(type==='addPost'){
    title.innerHTML='Add post location'+close;
    body.innerHTML=`<div class="fg"><label class="fl">Post name</label><input class="fi" id="m-pname" placeholder="e.g. Main Stage Left"></div>
      <div class="fg"><label class="fl">Zone / area</label><input class="fi" id="m-pzone" placeholder="e.g. Main Stage"></div>`;
    foot.innerHTML=`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="addPostModal()">Add post</button>`;
  }
  else if(type==='editPost'){
    const p=gp(arg);if(!p)return;
    title.innerHTML='Edit post'+close;
    body.innerHTML=`<div class="fg"><label class="fl">Post name</label><input class="fi" id="m-epname" value="${p.name}"></div>
      <div class="fg"><label class="fl">Zone</label><input class="fi" id="m-epzone" value="${p.zone}"></div>`;
    foot.innerHTML=`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveEditPost('${arg}')">Save</button>`;
  }
  else if(type==='addUnit'){
    title.innerHTML='Add unit'+close;
    body.innerHTML=`<div class="fr"><div class="fg"><label class="fl">Callsign</label><input class="fi" id="m-mcs" placeholder="MED-1"></div>
      <div class="fg"><label class="fl">Team name</label><input class="fi" id="m-mname" placeholder="Optional"></div></div>`;
    foot.innerHTML=`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="addUnitModal()">Add</button>`;
  }
  else if(type==='addCall'){
    const uOpts=S.units.map(u=>`<option value="${u.id}">${u.callsign}${u.name?' – '+u.name:''}</option>`).join('');
    const rOpts=S.resources.filter(r=>r.available>0).map(r=>`<option value="${r.id}">${r.name} (${r.available} avail.) @ ${r.location||'?'}</option>`).join('');
    title.innerHTML='Log call'+close;
    body.innerHTML=`<div class="fr">
      <div class="fg"><label class="fl">Type</label>
        <select class="fi" id="m-ctype">
          <option>Medical – general</option><option>Medical – trauma</option><option>Medical – cardiac</option>
          <option>Medical – respiratory</option><option>Behavioral</option><option>Heat illness</option>
          <option>Intoxication</option><option>Injury</option><option>Resource request</option><option>Other</option>
        </select>
      </div>
      <div class="fg"><label class="fl">Priority</label>
        <select class="fi" id="m-cpri"><option value="h">High</option><option value="m" selected>Med</option><option value="l">Low</option></select>
      </div>
    </div>
    <div class="fg"><label class="fl">Location / description</label><input class="fi" id="m-cloc" placeholder="e.g. Main Stage pit area"></div>
    <div class="fg"><label class="fl">Assign unit(s) — hold Ctrl/⌘ for multiple</label>
      <select class="fi" id="m-cunits" multiple style="height:80px">${uOpts}</select></div>
    ${rOpts?`<div class="fg"><label class="fl">Add resource</label>
      <select class="fi" id="m-cres"><option value="">None</option>${rOpts}</select></div>
      <div class="fg"><label class="fl">Qty</label><input class="fi" id="m-crqty" type="number" min="1" value="1"></div>`:''}`;
    foot.innerHTML=`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="logCall()">Log call</button>`;
  }
  else if(type==='addToCall'){
    const c=S.calls.find(c=>c.id===arg);if(!c)return;
    const uOpts=S.units.filter(u=>!c.unitIds.includes(u.id)).map(u=>`<option value="${u.id}">${u.callsign}${u.name?' – '+u.name:''}</option>`).join('');
    const rOpts=S.resources.filter(r=>r.available>0).map(r=>`<option value="${r.id}">${r.name} (${r.available} avail.) @ ${r.location||'?'}</option>`).join('');
    title.innerHTML='Add to call'+close;
    body.innerHTML=`<div class="fg"><label class="fl">Add unit</label>
      <select class="fi" id="m-atu"><option value="">None</option>${uOpts}</select></div>
    ${rOpts?`<div class="fg"><label class="fl">Add resource</label>
      <select class="fi" id="m-atr"><option value="">None</option>${rOpts}</select></div>
      <div class="fg"><label class="fl">Qty</label><input class="fi" id="m-atrq" type="number" min="1" value="1"></div>`:''}`;
    foot.innerHTML=`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="doAddToCall('${arg}')">Add</button>`;
  }

  ov.classList.add('on');
}

function openEditPost(id){openModal('editPost',id)}
function openAddToCall(id){openModal('addToCall',id)}

function closeModal(){document.getElementById('overlay').classList.remove('on')}

function addPostModal(){
  const name=document.getElementById('m-pname').value.trim();if(!name)return;
  const zone=document.getElementById('m-pzone').value.trim()||'General';
  S.posts.push({id:uid(),name,zone,unitIds:[]});
  updateZones();addLog(`Post added: ${name}`);save();renderAll();closeModal();
}
function saveEditPost(id){
  const p=gp(id);if(!p)return;
  p.name=document.getElementById('m-epname').value.trim()||p.name;
  p.zone=document.getElementById('m-epzone').value.trim()||p.zone;
  updateZones();save();renderAll();closeModal();
}
function addUnitModal(){
  const cs=document.getElementById('m-mcs').value.trim();if(!cs)return;
  const name=document.getElementById('m-mname').value.trim();
  S.units.push({id:uid(),callsign:cs,name,status:'available',postId:null,breakStart:null,postHistory:[]});
  addLog(`Unit added: ${cs}`);save();renderAll();closeModal();
}
function logCall(){
  const type=document.getElementById('m-ctype').value;
  const loc=document.getElementById('m-cloc').value.trim()||'Unknown';
  const pri=document.getElementById('m-cpri').value;
  const unitSel=document.getElementById('m-cunits');
  const unitIds=unitSel?[...unitSel.selectedOptions].map(o=>o.value):[];
  const resEl=document.getElementById('m-cres');
  const resId=resEl?resEl.value:'';
  const resQty=parseInt(document.getElementById('m-crqty')?.value)||1;
  const resources=[];
  if(resId){const res=S.resources.find(r=>r.id===resId);if(res&&res.available>=resQty){res.available-=resQty;resources.push({id:resId,qty:resQty})}}
  const t=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
  const call={id:uid(),type,location:loc,priority:pri,unitIds,resources,time:t};
  S.calls.push(call);
  unitIds.forEach(uid=>{const u=gu(uid);if(u){u.status='responding';addLog(`${u.callsign} → Responding: ${type}`,'call')}});
  addLog(`CALL: ${type} @ ${loc}`,'call');
  save();renderAll();closeModal();
}
function doAddToCall(callId){
  const c=S.calls.find(c=>c.id===callId);if(!c)return;
  const uid=document.getElementById('m-atu').value;
  const rid=document.getElementById('m-atr')?.value;
  const rq=parseInt(document.getElementById('m-atrq')?.value)||1;
  if(uid){c.unitIds.push(uid);const u=gu(uid);if(u){u.status='responding';addLog(`${u.callsign} added to call`,'call')}}
  if(rid){const res=S.resources.find(r=>r.id===rid);if(res&&res.available>=rq){res.available-=rq;c.resources=c.resources||[];c.resources.push({id:rid,qty:rq});addLog(`Resource dispatched: ${res.name} x${rq}`)}}
  save();renderAll();closeModal();
}

// ── INIT ──────────────────────────────────────────────
load();updateZones();renderAll();
</script>
</body>
</html>
