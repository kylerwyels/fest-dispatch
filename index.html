<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedDispatch</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#222536;--bg4:#2a2e42;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.15);
  --text:#e8eaf0;--text2:#8b90a8;--text3:#555a72;
  --accent:#4f8ef7;--accent2:#2d5fc7;
  --green:#22c97a;--amber:#f5a623;--red:#f04e4e;--purple:#a78bfa;--teal:#2dd4bf;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{display:flex;align-items:center;padding:0 14px;height:48px;background:var(--bg2);border-bottom:1px solid var(--border);gap:8px;flex-shrink:0}
.logo{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--accent);text-transform:uppercase}
.event-chip{font-size:11px;color:var(--text2);background:var(--bg3);padding:3px 9px;border-radius:4px;border:1px solid var(--border);cursor:pointer;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.event-chip:hover{border-color:var(--border2)}
.tab{background:transparent;border:1px solid transparent;color:var(--text2);padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:500;transition:all .15s}
.tab:hover{color:var(--text);border-color:var(--border)}
.tab.on{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.clock{margin-left:auto;font-family:var(--mono);font-size:13px;color:var(--text2);flex-shrink:0}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.sync-dot.ok{background:var(--green)}.sync-dot.busy{background:var(--amber)}.sync-dot.err{background:var(--red)}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden}

/* UNIT SIDEBAR — 25% */
.sidebar{width:25%;min-width:200px;max-width:320px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.panel-hdr{padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-scroll{overflow-y:auto;flex:1;padding:6px}

/* UNIT CARDS IN SIDEBAR */
.uc{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 9px;margin-bottom:5px}
.uc-top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.uc-cs{font-family:var(--mono);font-size:12px;font-weight:700;flex:1}
.uc-badge{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 5px;border-radius:3px}
.uc-location{font-size:10px;color:var(--text2);margin-bottom:4px}
.uc-ts{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:4px}
.uc-break-actions{display:flex;gap:4px;margin-top:5px}

/* BREAK TIMER */
.break-timer-display{font-family:var(--mono);font-size:13px;font-weight:700;padding:4px 8px;border-radius:4px;text-align:center;margin:4px 0;background:var(--bg4);border:1px solid var(--border)}
.break-timer-display.ok{color:var(--green);border-color:rgba(34,201,122,.3)}
.break-timer-display.warn{color:var(--amber);border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.08)}
.break-timer-display.over{color:var(--red);border-color:rgba(240,78,78,.4);background:rgba(240,78,78,.08)}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.3}}
.flashing{animation:flash .8s infinite}

/* STATUS COLORS */
.s-available{background:rgba(34,201,122,.15);color:var(--green)}
.s-posted{background:rgba(79,142,247,.15);color:var(--accent)}
.s-responding{background:rgba(245,166,35,.2);color:var(--amber)}
.s-onscene{background:rgba(240,78,78,.2);color:var(--red)}
.s-transporting{background:rgba(167,139,250,.2);color:var(--purple)}
.s-arrival{background:rgba(45,212,191,.2);color:var(--teal)}
.s-outofservice{background:rgba(85,90,114,.25);color:var(--text2)}
.s-break{background:rgba(245,166,35,.12);color:var(--amber)}
.s-training{background:rgba(79,142,247,.12);color:var(--accent)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block;vertical-align:middle}
.dg{background:var(--green)}.db{background:var(--accent)}.da{background:var(--amber)}
.dr{background:var(--red)}.dp{background:var(--purple)}.dt{background:var(--teal)}.d0{background:var(--text3)}

/* VIEWS */
.view{display:none;flex:1;overflow:hidden;flex-direction:column}
.view.on{display:flex}

/* BOARD */
.board-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden}

/* INACTIVE UNITS TRAY */
.inactive-tray{background:var(--bg2);border-bottom:2px solid var(--border2);padding:8px 12px;flex-shrink:0;min-height:44px;max-height:160px;overflow-y:auto}
.inactive-tray-hdr{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.inactive-tray-units{display:flex;flex-wrap:wrap;gap:6px}
.inactive-chip{border-radius:6px;padding:6px 10px;font-size:11px;border:1px solid var(--border2);min-width:140px}
.inactive-chip-top{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.inactive-chip-cs{font-family:var(--mono);font-weight:700;font-size:11px;flex:1}

/* BOARD TOOLBAR */
.board-bar{padding:7px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;background:var(--bg)}
.zpill{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:3px 9px;border-radius:20px;font-size:11px;cursor:pointer;transition:all .1s}
.zpill:hover{border-color:var(--border2)}
.zpill.on{border-color:var(--accent);color:#fff}

/* POST GRID */
.board-scroll{overflow-y:auto;flex:1;padding:10px}
.pgrid{display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start}

/* POST CARDS */
.pc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .15s,box-shadow .15s;cursor:default;position:relative}
.pc.drag-over{box-shadow:0 0 0 2px var(--accent);border-color:var(--accent)}
.pc.dragging{opacity:.4}
.pc.sz-sm{width:200px}.pc.sz-md{width:270px}.pc.sz-lg{width:360px}
.pc-hdr{display:flex;align-items:center;padding:7px 10px;border-bottom:1px solid var(--border);gap:6px}
.pc-drag-handle{color:var(--text3);cursor:grab;font-size:14px;padding:0 2px;user-select:none}
.pc-drag-handle:active{cursor:grabbing}
.pc-zone-name{font-size:11px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-body{padding:8px 10px;min-height:48px}
.pc-empty{font-size:11px;color:var(--text3);padding:4px 0}

/* POSTED UNIT IN POST CARD */
.pu{border-radius:5px;padding:7px 9px;margin-bottom:5px;border:1px solid rgba(255,255,255,.06)}
.pu-top{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.pu-cs{font-family:var(--mono);font-size:11px;font-weight:700;flex:1}
.sc{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.sb{background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:2px 6px;border-radius:3px;font-size:10px;cursor:pointer;font-weight:500;transition:all .1s}
.sb:hover{border-color:var(--border2);color:var(--text)}
.sb.active{font-weight:700}
.pu-ts{font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:4px}

/* NEXT POST REMINDER */
.next-post-area{background:var(--bg);border:1px dashed var(--border2);border-radius:4px;padding:4px 7px;margin-top:4px;font-size:10px}
.next-post-label{color:var(--text3);margin-bottom:3px;font-size:9px;text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.next-post-val{color:var(--accent);font-weight:600;margin-bottom:4px}
.next-post-confirm{background:rgba(34,201,122,.15);border:1px solid var(--green);color:var(--green);padding:2px 7px;border-radius:3px;font-size:10px;cursor:pointer;font-weight:600}
.next-post-confirm:hover{background:rgba(34,201,122,.25)}

/* ASSIGN ROW */
.assign-row{padding:4px 8px 7px;border-top:1px solid var(--border)}
.asel{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text2);font-size:11px;padding:3px 6px;width:100%;outline:none;cursor:pointer}
.asel:focus{border-color:var(--accent)}

/* SIZE CONTROLS */
.pc-size-ctrl{display:flex;gap:2px}
.size-btn{background:transparent;border:1px solid var(--border);color:var(--text3);padding:1px 5px;border-radius:3px;font-size:9px;cursor:pointer;font-weight:700}
.size-btn:hover{border-color:var(--border2);color:var(--text2)}
.size-btn.on{border-color:var(--accent);color:var(--accent)}

/* RIGHT PANEL — TRANSPORT */
.rpanel{width:200px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.res-item-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 9px;margin-bottom:5px}
.res-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:2px}
.res-home{font-size:10px;color:var(--text3);margin-bottom:5px}
.res-status-row{display:flex;align-items:center;gap:5px;font-size:10px}
.res-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.res-dot.home{background:var(--green)}.res-dot.away{background:var(--amber)}.res-dot.unknown{background:var(--text3)}
.res-actions{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.res-btn{background:var(--bg4);border:1px solid var(--border);color:var(--text2);padding:2px 6px;border-radius:3px;font-size:10px;cursor:pointer}
.res-btn:hover{border-color:var(--border2);color:var(--text)}
.res-btn.active{border-color:var(--amber);color:var(--amber);background:rgba(245,166,35,.1)}

/* SETUP */
.setup-wrap{padding:14px;overflow-y:auto;flex:1}
.setup-sec{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px}
.setup-sec-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.si{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:6px 10px;margin-bottom:5px}
.si-name{flex:1;font-size:12px;color:var(--text)}
.si-meta{font-size:11px;color:var(--text2)}
.qa{display:flex;gap:5px;margin-top:8px;align-items:center;flex-wrap:wrap}

/* LOG */
.log-item{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.log-time{font-family:var(--mono);color:var(--text3);flex-shrink:0}

/* BUTTONS */
.btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:4px;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--border2);color:var(--text)}
.btn.primary{background:var(--accent2);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent)}
.btn.sm{padding:3px 8px;font-size:10px}
.btn.danger:hover{border-color:var(--red);background:rgba(240,78,78,.1);color:var(--red)}
.ibtn{background:transparent;border:none;color:var(--text3);cursor:pointer;padding:2px 3px;border-radius:3px;font-size:13px;display:inline-flex;align-items:center;transition:color .15s}
.ibtn:hover{color:var(--text2)}
.xbtn{background:transparent;border:none;color:var(--text3);cursor:pointer;padding:1px 4px;border-radius:3px;font-size:13px;line-height:1;transition:color .15s}
.xbtn:hover{color:var(--red)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:999}
.overlay.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:18px;width:420px;max-width:95vw;max-height:88vh;overflow-y:auto}
.modal-title{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.fg{margin-bottom:10px}
.fl{font-size:11px;color:var(--text2);margin-bottom:3px;display:block}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:13px;padding:6px 10px;outline:none}
.fi:focus{border-color:var(--accent)}
.fr{display:flex;gap:8px}
.fr .fg{flex:1}
select.fi option{background:var(--bg3)}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@media(max-width:680px){.sidebar{display:none}.rpanel{display:none}.pgrid{flex-direction:column}.pc.sz-sm,.pc.sz-md,.pc.sz-lg{width:100%}}

/* ZONE COLORS */
.zc-red{background:rgba(240,78,78,.12);border-color:rgba(240,78,78,.3)!important}
.zc-blue{background:rgba(79,142,247,.1);border-color:rgba(79,142,247,.3)!important}
.zc-green{background:rgba(34,201,122,.1);border-color:rgba(34,201,122,.3)!important}
.zc-purple{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.3)!important}
.zc-amber{background:rgba(245,166,35,.1);border-color:rgba(245,166,35,.3)!important}
.zc-teal{background:rgba(45,212,191,.1);border-color:rgba(45,212,191,.3)!important}
.zc-pink{background:rgba(244,114,182,.1);border-color:rgba(244,114,182,.3)!important}
.zc-orange{background:rgba(251,146,60,.1);border-color:rgba(251,146,60,.3)!important}
.zc-indigo{background:rgba(129,140,248,.1);border-color:rgba(129,140,248,.3)!important}
.zc-gray{background:rgba(148,163,184,.08);border-color:rgba(148,163,184,.25)!important}
.zc-red .pc-hdr{background:rgba(240,78,78,.15)}
.zc-blue .pc-hdr{background:rgba(79,142,247,.12)}
.zc-green .pc-hdr{background:rgba(34,201,122,.12)}
.zc-purple .pc-hdr{background:rgba(167,139,250,.12)}
.zc-amber .pc-hdr{background:rgba(245,166,35,.12)}
.zc-teal .pc-hdr{background:rgba(45,212,191,.12)}
.zc-pink .pc-hdr{background:rgba(244,114,182,.12)}
.zc-orange .pc-hdr{background:rgba(251,146,60,.12)}
.zc-indigo .pc-hdr{background:rgba(129,140,248,.12)}
.zc-gray .pc-hdr{background:rgba(148,163,184,.1)}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">MedDispatch</span>
  <span class="event-chip" id="eventChip">Set event →</span>
  <button class="tab on" data-tab="board">Board</button>
  <button class="tab" data-tab="setup">Setup</button>
  <button class="tab" data-tab="log">Log</button>
  <span class="sync-dot" id="syncDot"></span>
  <span class="clock" id="clock">--:--:--</span>
</div>

<div class="main">

<!-- UNIT SIDEBAR 25% -->
<div class="sidebar">
  <div class="panel-hdr">
    Units <span id="uCount" style="color:var(--text2);margin-left:4px">0</span>
    <div style="display:flex;gap:4px">
      <button class="ibtn" id="btnBreakUnit" title="Put unit on break">⏱</button>
      <button class="ibtn" id="btnAddUnit" title="Add unit">＋</button>
    </div>
  </div>
  <div class="panel-scroll" id="unitSidebar"></div>
</div>

<!-- BOARD VIEW -->
<div class="view on" id="view-board">
  <div class="board-wrap">

    <!-- INACTIVE TRAY -->
    <div class="inactive-tray" id="inactiveTray" style="display:none">
      <div class="inactive-tray-hdr">On Break / Training / Out of Service</div>
      <div class="inactive-tray-units" id="inactiveUnits"></div>
    </div>

    <!-- BOARD TOOLBAR -->
    <div class="board-bar">
      <div id="zonePills" style="display:flex;gap:4px;flex-wrap:wrap"></div>
      <div style="margin-left:auto;display:flex;gap:5px">
        <button class="btn" id="btnAddPost">＋ Post</button>
      </div>
    </div>

    <!-- POST GRID -->
    <div class="board-scroll">
      <div class="pgrid" id="pgrid"></div>
    </div>
  </div>
</div>

<!-- SETUP VIEW -->
<div class="view" id="view-setup">
  <div class="setup-wrap">
    <div class="setup-sec">
      <div class="setup-sec-title">Event</div>
      <div class="fr">
        <div class="fg"><label class="fl">Event name</label><input class="fi" id="s-evName" placeholder="Festival name"></div>
        <div class="fg"><label class="fl">Date</label><input class="fi" type="date" id="s-evDate"></div>
      </div>
      <button class="btn primary" id="btnSaveEvent" style="margin-top:8px">Save event</button>
    </div>
    <div class="setup-sec">
      <div class="setup-sec-title">Units / teams</div>
      <div id="s-unitList"></div>
      <div class="qa">
        <input class="fi" id="s-cs" placeholder="Callsign e.g. MED-1" style="font-size:12px;padding:5px 8px;flex:1">
        <input class="fi" id="s-uname" placeholder="Team name (opt)" style="font-size:12px;padding:5px 8px;flex:1">
        <button class="btn primary" id="btnAddUnitSetup">＋</button>
      </div>
    </div>
    <div class="setup-sec">
      <div class="setup-sec-title">Post locations</div>
      <div id="s-postList"></div>
      <div class="qa">
        <input class="fi" id="s-pname" placeholder="Location name e.g. Stage Left" style="font-size:12px;padding:5px 8px;flex:2">
        <input class="fi" id="s-pzone" placeholder="Zone e.g. Stage 1" style="font-size:12px;padding:5px 8px;flex:1">
        <select class="fi" id="s-pcolor" style="font-size:12px;padding:5px 8px;flex:1">
          <option value="blue">Blue</option><option value="green">Green</option><option value="red">Red</option>
          <option value="purple">Purple</option><option value="amber">Amber</option><option value="teal">Teal</option>
          <option value="pink">Pink</option><option value="orange">Orange</option><option value="indigo">Indigo</option>
          <option value="gray">Gray</option>
        </select>
        <button class="btn primary" id="btnAddPostSetup">＋</button>
      </div>
    </div>
    <div class="setup-sec">
      <div class="setup-sec-title">Zone colors (edit existing)</div>
      <div id="s-zoneColorList"></div>
    </div>
    <div class="setup-sec">
      <div class="setup-sec-title">Transport resources</div>
      <div id="s-resList"></div>
      <div class="qa">
        <input class="fi" id="s-rname" placeholder="Name e.g. Wheelchair 1" style="font-size:12px;padding:5px 8px;flex:2">
        <input class="fi" id="s-rloc" placeholder="Home location" style="font-size:12px;padding:5px 8px;flex:2">
        <button class="btn primary" id="btnAddResource">＋</button>
      </div>
    </div>
  </div>
</div>

<!-- LOG VIEW -->
<div class="view" id="view-log">
  <div style="padding:12px;flex:1;overflow-y:auto">
    <div style="font-size:11px;color:var(--text2);margin-bottom:10px">Activity log (newest first)</div>
    <div id="logList"></div>
  </div>
</div>

<!-- RIGHT PANEL — TRANSPORT -->
<div class="rpanel">
  <div class="panel-hdr">Transport resources</div>
  <div class="panel-scroll" id="resPanel"></div>
</div>

</div><!-- /main -->

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="mTitle"></div>
    <div id="mBody"></div>
    <div id="mFoot" style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px"></div>
  </div>
</div>

<script>
var SB_URL='https://rtievdrzjxuqsfoiotqm.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0aWV2ZHJ6anh1cXNmb2lvdHFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNzc1MDIsImV4cCI6MjA5MzY1MzUwMn0.Vu8FgDUdCe-P5gErfbvrfTrB20nn2xGfk--2GwgQETk';
var H={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

var S={event:{name:'',date:''},units:[],posts:[],resources:[],log:[],zones:[],zoneColors:{},postOrder:[]};
var activeZone='ALL';
var saveTimer=null;
var lastSaved=0;
var dragSrcId=null;

// ── SYNC ──────────────────────────────────────────────
function setSS(s){document.getElementById('syncDot').className='sync-dot '+s}
async function push(){
  setSS('busy');
  try{
    var r=await fetch(SB_URL+'/rest/v1/dispatch_state?id=eq.main',{method:'PATCH',headers:Object.assign({'Prefer':'return=minimal'},H),body:JSON.stringify({data:S,updated_at:new Date().toISOString()})});
    if(r.ok){setSS('ok');lastSaved=Date.now();localStorage.setItem('mdd',JSON.stringify(S))}else setSS('err');
  }catch(e){setSS('err');localStorage.setItem('mdd',JSON.stringify(S))}
}
async function pull(){
  try{
    var r=await fetch(SB_URL+'/rest/v1/dispatch_state?id=eq.main&select=data',{headers:H});
    if(r.ok){var rows=await r.json();if(rows.length&&rows[0].data&&Object.keys(rows[0].data).length>0){S=Object.assign({},S,rows[0].data);setSS('ok');return}}
  }catch(e){}
  try{var b=localStorage.getItem('mdd');if(b){S=Object.assign({},S,JSON.parse(b));setSS('err')}}catch(e){}
}
function save(){localStorage.setItem('mdd',JSON.stringify(S));clearTimeout(saveTimer);saveTimer=setTimeout(push,1500)}
async function poll(){
  if(Date.now()-lastSaved<1000)return;
  try{
    var r=await fetch(SB_URL+'/rest/v1/dispatch_state?id=eq.main&select=data,updated_at',{headers:H});
    if(r.ok){var rows=await r.json();if(rows.length){var rt=new Date(rows[0].updated_at).getTime();if(rt>lastSaved+1000){S=Object.assign({},S,rows[0].data);lastSaved=rt;renderAll();setSS('ok')}}}
  }catch(e){}
}
setInterval(poll,2000);
setInterval(function(){try{fetch(SB_URL+'/rest/v1/dispatch_state?id=eq.main&select=id',{headers:H})}catch(e){}},86400000);

// ── HELPERS ───────────────────────────────────────────
function gu(id){return S.units.find(function(u){return u.id===id})}
function gp(id){return S.posts.find(function(p){return p.id===id})}
function mkid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}

var STATUSES=[
  {k:'available',l:'Available',dc:'dg',bc:'s-available'},
  {k:'posted',l:'Posted',dc:'db',bc:'s-posted'},
  {k:'responding',l:'Responding',dc:'da',bc:'s-responding'},
  {k:'onscene',l:'On Scene',dc:'dr',bc:'s-onscene'},
  {k:'transporting',l:'Transporting',dc:'dp',bc:'s-transporting'},
  {k:'arrival',l:'Arrival',dc:'dt',bc:'s-arrival'},
  {k:'outofservice',l:'Out of Service',dc:'d0',bc:'s-outofservice'},
  {k:'break',l:'Break',dc:'da',bc:'s-break'},
  {k:'training',l:'Training',dc:'db',bc:'s-training'},
];
function getSM(k){return STATUSES.find(function(s){return s.k===k})||STATUSES[0]}

function isInactive(u){return u.status==='break'||u.status==='training'||u.status==='outofservice'}

var ZONE_COLORS=['blue','green','red','purple','amber','teal','pink','orange','indigo','gray'];

function getZoneColor(zone){return S.zoneColors&&S.zoneColors[zone]?S.zoneColors[zone]:'blue'}

// ── LOG ───────────────────────────────────────────────
var LC={info:'var(--text2)',warn:'var(--amber)',call:'var(--red)',move:'var(--accent)'};
function addLog(msg,type){
  type=type||'info';
  var t=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  S.log.unshift({time:t,msg:msg,type:type});
  if(S.log.length>500)S.log.pop();
}

// ── UNITS ─────────────────────────────────────────────
function addUnit(){
  var cs=document.getElementById('s-cs').value.trim();if(!cs)return;
  var name=document.getElementById('s-uname').value.trim();
  S.units.push({id:mkid(),callsign:cs,name:name,status:'available',postId:null,statusAt:Date.now(),postHistory:[],nextPost:null,breakEnd:null});
  document.getElementById('s-cs').value='';document.getElementById('s-uname').value='';
  addLog('Unit added: '+cs);save();renderAll();
}
function removeUnit(id){
  var u=gu(id);if(!u)return;
  unassign(id);S.units=S.units.filter(function(u){return u.id!==id});
  addLog('Unit removed: '+u.callsign,'warn');save();renderAll();
}
function setStatus(uid,status){
  var u=gu(uid);if(!u)return;
  var prev=u.status;
  // If going inactive, remove from post
  if(isInactive({status:status})){
    if(u.postId){
      var p=gp(u.postId);if(p)p.unitIds=(p.unitIds||[]).filter(function(i){return i!==uid});
      u.postId=null;
    }
  }
  // If coming back to available from inactive, clear break
  if(prev!==status){
    u.status=status;
    u.statusAt=Date.now();
    if(status!=='break'&&status!=='training')u.breakEnd=null;
    addLog(u.callsign+' → '+getSM(status).l);
  }
  save();renderAll();
}
function unassign(uid){
  var u=gu(uid);if(!u)return;
  if(u.postId){var p=gp(u.postId);if(p)p.unitIds=(p.unitIds||[]).filter(function(i){return i!==uid})}
  u.postId=null;
  if(u.status==='posted')u.status='available';
  u.statusAt=Date.now();
}
function assignToPost(uid,postId){
  var u=gu(uid),p=gp(postId);if(!u||!p)return;
  if(u.postId===postId)return;
  if(u.postId){var op=gp(u.postId);if(op)op.unitIds=(op.unitIds||[]).filter(function(i){return i!==uid})}
  u.postId=postId;u.status='posted';u.statusAt=Date.now();
  p.unitIds=p.unitIds||[];if(p.unitIds.indexOf(uid)===-1)p.unitIds.push(uid);
  var t=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
  u.postHistory=u.postHistory||[];u.postHistory.push({postId:postId,postName:p.name,zone:p.zone,time:t});
  u.nextPost=null;
  addLog(u.callsign+' → '+p.zone+' – '+p.name,'move');save();renderAll();
}
function confirmNextPost(uid){
  var u=gu(uid);if(!u||!u.nextPost)return;
  assignToPost(uid,u.nextPost);
}

// ── POSTS ─────────────────────────────────────────────
function addPost(){
  var name=document.getElementById('s-pname').value.trim();if(!name)return;
  var zone=document.getElementById('s-pzone').value.trim()||'General';
  var color=document.getElementById('s-pcolor').value||'blue';
  if(!S.zoneColors)S.zoneColors={};
  if(!S.zoneColors[zone])S.zoneColors[zone]=color;
  var id=mkid();
  S.posts.push({id:id,name:name,zone:zone,unitIds:[],size:'md'});
  S.postOrder=S.postOrder||[];S.postOrder.push(id);
  document.getElementById('s-pname').value='';document.getElementById('s-pzone').value='';
  updateZones();addLog('Post added: '+zone+' – '+name);save();renderAll();
}
function removePost(id){
  var p=gp(id);if(!p)return;
  (p.unitIds||[]).forEach(function(uid){var u=gu(uid);if(u){u.postId=null;if(u.status==='posted')u.status='available'}});
  S.posts=S.posts.filter(function(p){return p.id!==id});
  S.postOrder=(S.postOrder||[]).filter(function(i){return i!==id});
  updateZones();addLog('Post removed: '+p.name,'warn');save();renderAll();
}
function setPostSize(postId,sz){
  var p=gp(postId);if(p){p.size=sz;save();renderBoard()}
}
function updateZones(){
  S.zones=S.posts.map(function(p){return p.zone}).filter(function(z,i,a){return z&&a.indexOf(z)===i});
}

// ── RESOURCES ─────────────────────────────────────────
function addResource(){
  var name=document.getElementById('s-rname').value.trim();if(!name)return;
  var loc=document.getElementById('s-rloc').value.trim();
  S.resources.push({id:mkid(),name:name,home:loc,status:'home',currentLoc:loc,attachedUnit:null});
  document.getElementById('s-rname').value='';document.getElementById('s-rloc').value='';
  addLog('Resource added: '+name);save();renderAll();
}
function removeResource(id){S.resources=S.resources.filter(function(r){return r.id!==id});save();renderAll()}
function setResStatus(id,status,loc){
  var res=S.resources.find(function(r){return r.id===id});if(!res)return;
  res.status=status;
  if(loc!==undefined)res.currentLoc=loc;
  if(status==='home'){res.currentLoc=res.home;res.attachedUnit=null}
  addLog('Resource '+res.name+': '+status);save();renderResources();
}

// ── SIDEBAR ───────────────────────────────────────────
function renderSidebar(){
  var el=document.getElementById('unitSidebar');
  if(!S.units.length){el.innerHTML='<div style="font-size:11px;color:var(--text3);padding:12px;text-align:center">Add units in Setup</div>';return}
  el.innerHTML=S.units.map(function(u){
    var sm=getSM(u.status);
    var post=u.postId?gp(u.postId):null;
    var lastPost=u.postHistory&&u.postHistory.length?u.postHistory[u.postHistory.length-1]:null;
    var locLine='';
    if(post){locLine='<div class="uc-location">'+post.zone+' – '+post.name+'</div>'}
    else if(lastPost&&u.status!=='available'){locLine='<div class="uc-location" style="color:var(--text3)">Last: '+lastPost.zone+' – '+lastPost.postName+'</div>'}
    var tsLine='';
    if(u.statusAt){
      var mins=Math.floor((Date.now()-u.statusAt)/60000);
      tsLine='<div class="uc-ts">'+sm.l+' '+mins+'m</div>';
    }
    // Break timer
    var breakLine='';
    if((u.status==='break'||u.status==='training')&&u.breakEnd){
      var now=Date.now();
      var end=u.breakEnd;
      var diff=end-now;
      var absDiff=Math.abs(diff);
      var bMins=Math.floor(absDiff/60000);
      var bSecs=Math.floor((absDiff%60000)/1000);
      var bStr=(diff>0?'':'+')+bMins+'m '+String(bSecs).padStart(2,'0')+'s';
      var cls=diff>300000?'ok':diff>0?'warn':'over';
      var flash=diff<=0?' flashing':'';
      breakLine='<div class="break-timer-display '+cls+flash+'">'+bStr+'</div>';
    }
    // Next post reminder
    var nextLine='';
    if(u.nextPost){
      var np=gp(u.nextPost);
      if(np){
        var showConfirm=u.status==='available';
        nextLine='<div class="next-post-area"><div class="next-post-label">Next post</div><div class="next-post-val">'+np.zone+' – '+np.name+'</div>'+(showConfirm?'<button class="next-post-confirm" data-action="confirmnext" data-uid="'+u.id+'">→ Move there</button>':'')+'</div>';
      }
    }
    return '<div class="uc"><div class="uc-top"><span class="dot '+sm.dc+'" style="margin-right:2px"></span><span class="uc-cs">'+u.callsign+'</span><span class="uc-badge '+sm.bc+'">'+sm.l+'</span><button class="xbtn" data-action="removeunit" data-uid="'+u.id+'">🗑</button></div>'+locLine+tsLine+breakLine+nextLine+'<div class="uc-break-actions"><button class="btn sm" data-action="setnextpost" data-uid="'+u.id+'">Next post</button><button class="btn sm" data-action="openbreak" data-uid="'+u.id+'">Break/Train</button></div></div>';
  }).join('');
}

// ── INACTIVE TRAY ─────────────────────────────────────
function renderInactiveTray(){
  var inactive=S.units.filter(function(u){return isInactive(u)});
  var tray=document.getElementById('inactiveTray');
  var units=document.getElementById('inactiveUnits');
  if(!inactive.length){tray.style.display='none';return}
  tray.style.display='block';
  units.innerHTML=inactive.map(function(u){
    var sm=getSM(u.status);
    var breakLine='';
    if(u.breakEnd){
      var now=Date.now();var diff=u.breakEnd-now;
      var absDiff=Math.abs(diff);
      var bMins=Math.floor(absDiff/60000);var bSecs=Math.floor((absDiff%60000)/1000);
      var bStr=(diff>0?'':'+')+bMins+'m '+String(bSecs).padStart(2,'0')+'s';
      var cls=diff>300000?'ok':diff>0?'warn':'over';
      var flash=diff<=0?' flashing':'';
      breakLine='<div class="break-timer-display '+cls+flash+'" style="font-size:11px;padding:2px 6px">'+bStr+'</div>';
    }
    return '<div class="inactive-chip zc-'+getZoneColor('_inactive')+'_" style="background:var(--bg3);border:1px solid var(--border2)"><div class="inactive-chip-top"><span class="dot '+sm.dc+'"></span><span class="inactive-chip-cs">'+u.callsign+'</span><span class="uc-badge '+sm.bc+'" style="font-size:8px">'+sm.l+'</span><button class="btn sm" data-action="setstatusinactive" data-uid="'+u.id+'" data-status="available" style="margin-left:auto;font-size:9px;padding:1px 5px">Clear</button></div>'+breakLine+'</div>';
  }).join('');
}

// ── BOARD ─────────────────────────────────────────────
function renderBoard(){
  renderInactiveTray();
  updateZones();
  var zp=document.getElementById('zonePills');
  zp.innerHTML='<span class="zpill'+(activeZone==='ALL'?' on':'')+'" data-z="ALL" style="'+(activeZone==='ALL'?'background:var(--accent2);border-color:var(--accent);color:#fff':'')+'">All</span>'+
    S.zones.map(function(z){
      var c=getZoneColor(z);
      var on=activeZone===z;
      return '<span class="zpill'+(on?' on':'')+'" data-z="'+z+'" style="'+(on?'background:var(--accent2);border-color:var(--accent);color:#fff':'')+'">'+z+'</span>';
    }).join('');

  var posts=S.posts.filter(function(p){return activeZone==='ALL'||p.zone===activeZone});
  // Sort by postOrder
  var order=S.postOrder||[];
  posts.sort(function(a,b){var ai=order.indexOf(a.id),bi=order.indexOf(b.id);return(ai===-1?9999:ai)-(bi===-1?9999:bi)});

  var grid=document.getElementById('pgrid');
  if(!posts.length){grid.innerHTML='<div style="font-size:12px;color:var(--text3);padding:20px">No posts yet. Add one in Setup →</div>';return}

  grid.innerHTML=posts.map(function(p){
    var units=(p.unitIds||[]).map(function(id){return gu(id)}).filter(Boolean);
    var zc='zc-'+getZoneColor(p.zone);
    var sz=p.size||'md';

    var unitsHtml=units.map(function(u){
      var sm=getSM(u.status);
      var statusBtns=STATUSES.filter(function(s){return s.k!=='break'&&s.k!=='training'&&s.k!=='outofservice'}).map(function(s){
        return '<button class="sb'+(u.status===s.k?' active':'')+'" style="'+(u.status===s.k?getBtnStyle(s.k):'')+'" data-action="setstatus" data-uid="'+u.id+'" data-status="'+s.k+'">'+s.l+'</button>';
      }).join('');
      var tsLine='';
      if(u.statusAt){var mins=Math.floor((Date.now()-u.statusAt)/60000);tsLine='<div class="pu-ts">'+sm.l+' for '+mins+'m</div>'}
      // Next post
      var nextLine='';
      if(u.nextPost){
        var np=gp(u.nextPost);
        if(np){
          var showConfirm=u.status==='available';
          nextLine='<div class="next-post-area"><div class="next-post-label">Next post</div><div class="next-post-val">'+np.zone+' – '+np.name+'</div>'+(showConfirm?'<button class="next-post-confirm" data-action="confirmnext" data-uid="'+u.id+'">→ Move there</button>':'')+'</div>';
        }
      }
      return '<div class="pu" style="background:rgba(0,0,0,.2)"><div class="pu-top"><span class="dot '+sm.dc+'"></span><span class="pu-cs">'+u.callsign+'</span><span class="uc-badge '+sm.bc+'" style="font-size:9px">'+sm.l+'</span><button class="xbtn" data-action="unassign" data-uid="'+u.id+'">✕</button></div><div class="sc">'+statusBtns+'</div>'+tsLine+nextLine+'</div>';
    }).join('');

    var empty=units.length?'':'<div class="pc-empty">Unoccupied</div>';
    var avail=S.units.filter(function(u){return!isInactive(u)&&(!u.postId||u.status==='available')&&!units.find(function(x){return x.id===u.id})});
    var assignRow=avail.length?'<div class="assign-row"><select class="asel" data-action="assign" data-post-id="'+p.id+'"><option value="">Assign unit…</option>'+avail.map(function(u){return'<option value="'+u.id+'">'+u.callsign+(u.name?' – '+u.name:'')+'</option>'}).join('')+'</select></div>':'';
    var sizeCtrl='<div class="pc-size-ctrl"><button class="size-btn'+(sz==='sm'?' on':'')+'" data-action="setsize" data-pid="'+p.id+'" data-sz="sm">S</button><button class="size-btn'+(sz==='md'?' on':'')+'" data-action="setsize" data-pid="'+p.id+'" data-sz="md">M</button><button class="size-btn'+(sz==='lg'?' on':'')+'" data-action="setsize" data-pid="'+p.id+'" data-sz="lg">L</button></div>';

    return '<div class="pc sz-'+sz+' '+zc+'" id="pc-'+p.id+'" draggable="true" data-post-id="'+p.id+'"><div class="pc-hdr"><span class="pc-drag-handle" title="Drag to reorder">⠿</span><span class="pc-zone-name">'+p.zone+' — '+p.name+'</span>'+sizeCtrl+'<button class="ibtn" data-action="removepost" data-pid="'+p.id+'" title="Remove">🗑</button></div><div class="pc-body">'+unitsHtml+empty+'</div>'+assignRow+'</div>';
  }).join('');

  // Drag to reorder
  grid.querySelectorAll('.pc').forEach(function(card){
    card.addEventListener('dragstart',function(e){dragSrcId=card.dataset.postId;card.classList.add('dragging');e.dataTransfer.effectAllowed='move'});
    card.addEventListener('dragend',function(){card.classList.remove('dragging');grid.querySelectorAll('.pc').forEach(function(c){c.classList.remove('drag-over')})});
    card.addEventListener('dragover',function(e){e.preventDefault();card.classList.add('drag-over')});
    card.addEventListener('dragleave',function(){card.classList.remove('drag-over')});
    card.addEventListener('drop',function(e){
      e.preventDefault();card.classList.remove('drag-over');
      if(!dragSrcId||dragSrcId===card.dataset.postId)return;
      var order=S.postOrder||S.posts.map(function(p){return p.id});
      var from=order.indexOf(dragSrcId);var to=order.indexOf(card.dataset.postId);
      if(from===-1||to===-1)return;
      order.splice(from,1);order.splice(to,0,dragSrcId);
      S.postOrder=order;save();renderBoard();
    });
  });
}

function getBtnStyle(k){
  var map={available:'background:rgba(34,201,122,.2);color:var(--green);border-color:var(--green)',posted:'background:rgba(79,142,247,.2);color:var(--accent);border-color:var(--accent)',responding:'background:rgba(245,166,35,.2);color:var(--amber);border-color:var(--amber)',onscene:'background:rgba(240,78,78,.2);color:var(--red);border-color:var(--red)',transporting:'background:rgba(167,139,250,.2);color:var(--purple);border-color:var(--purple)',arrival:'background:rgba(45,212,191,.2);color:var(--teal);border-color:var(--teal)',outofservice:'background:rgba(85,90,114,.3);color:var(--text2);border-color:var(--text2)'};

}

// ── LOG ───────────────────────────────────────────────
function renderLog(){
  document.getElementById('logList').innerHTML=S.log.map(function(l){return'<div class="log-item"><span class="log-time">'+l.time+'</span><span style="color:'+(LC[l.type]||'var(--text2)')+'">'+l.msg+'</span></div>'}).join('');
}

// ── TABS ──────────────────────────────────────────────
function showTab(v){
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('on')});
  document.getElementById('view-'+v).classList.add('on');
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.querySelector('[data-tab="'+v+'"]').classList.add('on');
  if(v==='setup')renderSetup();
  else if(v==='log')renderLog();
  else if(v==='board')renderBoard();
}

// ── MODALS ────────────────────────────────────────────
function openModal(type,arg){
  var title=document.getElementById('mTitle');
  var body=document.getElementById('mBody');
  var foot=document.getElementById('mFoot');
  foot.innerHTML='';

  if(type==='addUnit'){
    title.textContent='Add unit';
    body.innerHTML='<div class="fr"><div class="fg"><label class="fl">Callsign</label><input class="fi" id="m-mcs" placeholder="MED-1"></div><div class="fg"><label class="fl">Team name</label><input class="fi" id="m-mname" placeholder="Optional"></div></div>';
    foot.appendChild(mkBtn('Cancel',false,closeModal));
    foot.appendChild(mkBtn('Add',true,function(){
      var cs=document.getElementById('m-mcs').value.trim();if(!cs)return;
      var name=document.getElementById('m-mname').value.trim();
      S.units.push({id:mkid(),callsign:cs,name:name,status:'available',postId:null,statusAt:Date.now(),postHistory:[],nextPost:null,breakEnd:null});
      addLog('Unit added: '+cs);save();renderAll();closeModal();
    }));
  }
  else if(type==='breakunit'){
    var u=gu(arg);if(!u)return;
    title.textContent='Break / Training — '+u.callsign;
    body.innerHTML='<div class="fg"><label class="fl">Type</label><div style="display:flex;gap:6px"><button class="btn" id="btype-break" data-btype="break">Break</button><button class="btn" id="btype-training" data-btype="training">Training</button></div></div><div class="fg"><label class="fl">End time (24hr)</label><input class="fi" id="m-bendtime" type="time" value="'+getNextHalfHour()+'"></div>';
    var selType='break';
    document.addEventListener('click',function handler(e){
      var btn=e.target.closest('[data-btype]');
      if(btn){selType=btn.dataset.btype;document.getElementById('btype-break').classList.toggle('primary',selType==='break');document.getElementById('btype-training').classList.toggle('primary',selType==='training')}
    },{once:false});
    document.getElementById('btype-break').classList.add('primary');
    foot.appendChild(mkBtn('Cancel',false,closeModal));
    foot.appendChild(mkBtn('Start',true,function(){
      var timeVal=document.getElementById('m-bendtime').value;
      var endMs=parseTimeToMs(timeVal);
      var uu=gu(arg);if(!uu)return;
      if(uu.postId){var p=gp(uu.postId);if(p)p.unitIds=(p.unitIds||[]).filter(function(i){return i!==arg});uu.postId=null}
      uu.status=selType;uu.statusAt=Date.now();uu.breakEnd=endMs;
      addLog(uu.callsign+' → '+selType+' until '+timeVal,'warn');save();renderAll();closeModal();
    }));
  }
  else if(type==='setnextpost'){
    var u=gu(arg);if(!u)return;
    title.textContent='Set next post — '+u.callsign;
    var postOpts=S.posts.map(function(p){return'<option value="'+p.id+'"'+(u.nextPost===p.id?' selected':'')+'>'+p.zone+' – '+p.name+'</option>'}).join('');
    body.innerHTML='<div class="fg"><label class="fl">Next post</label><select class="fi" id="m-nextpost"><option value="">Clear / none</option>'+postOpts+'</select></div>';
    foot.appendChild(mkBtn('Cancel',false,closeModal));
    foot.appendChild(mkBtn('Set',true,function(){
      var val=document.getElementById('m-nextpost').value;
      var uu=gu(arg);if(!uu)return;
      uu.nextPost=val||null;
      save();renderAll();closeModal();
    }));
  }
  else if(type==='deployres'){
    var res=S.resources.find(function(r){return r.id===arg});if(!res)return;
    title.textContent='Deploy — '+res.name;
    body.innerHTML='<div class="fg"><label class="fl">Current location (leave blank if unknown)</label><input class="fi" id="m-resloc" placeholder="e.g. Main Stage pit" value="'+(res.currentLoc||'')+'"></div>';
    foot.appendChild(mkBtn('Cancel',false,closeModal));
    foot.appendChild(mkBtn('Deploy',true,function(){
      var loc=document.getElementById('m-resloc').value.trim();
      setResStatus(arg,loc?'away':'unknown',loc||'?');closeModal();
    }));
  }

  document.getElementById('overlay').classList.add('on');
}

function getNextHalfHour(){
  var n=new Date();n.setMinutes(n.getMinutes()<30?30:0);if(n.getMinutes()===0)n.setHours(n.getHours()+1);
  return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
function parseTimeToMs(timeStr){
  var parts=timeStr.split(':');var h=parseInt(parts[0]);var m=parseInt(parts[1])||0;
  var now=new Date();var end=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m,0,0);
  if(end<=now)end.setDate(end.getDate()+1);
  return end.getTime();
}

function mkBtn(label,primary,fn){
  var b=document.createElement('button');b.textContent=label;b.className='btn'+(primary?' primary':'');b.addEventListener('click',fn);return b;
}
function closeModal(){document.getElementById('overlay').classList.remove('on')}

// ── EVENT DELEGATION ──────────────────────────────────
document.addEventListener('click',function(e){
  if(e.target===document.getElementById('overlay')){closeModal();return}
  var t=e.target.closest('[data-action]');
  if(!t)return;
  var a=t.dataset.action;
  if(a==='setstatus'||a==='setstatusinactive'){
    var s=t.dataset.status;var uid=t.dataset.uid;
    if(isInactive({status:s})){
      var u=gu(uid);if(u){if(u.postId){var p=gp(u.postId);if(p)p.unitIds=(p.unitIds||[]).filter(function(i){return i!==uid});u.postId=null}u.status=s;u.statusAt=Date.now();addLog(u.callsign+' → '+getSM(s).l);save();renderAll();}
    } else {setStatus(uid,s)}
  }
  else if(a==='unassign'){var u=gu(t.dataset.uid);if(u){unassign(t.dataset.uid);addLog(u.callsign+' removed from post','move');save();renderAll();}}
  else if(a==='removepost')removePost(t.dataset.pid);
  else if(a==='removeunit')removeUnit(t.dataset.uid);
  else if(a==='removeres')removeResource(t.dataset.rid);
  else if(a==='setsize')setPostSize(t.dataset.pid,t.dataset.sz);
  else if(a==='openbreak')openModal('breakunit',t.dataset.uid);
  else if(a==='setnextpost')openModal('setnextpost',t.dataset.uid);
  else if(a==='confirmnext')confirmNextPost(t.dataset.uid);
  else if(a==='setres'){
    var rid=t.dataset.rid;var st=t.dataset.status;
    if(st==='away')openModal('deployres',rid);
    else setResStatus(rid,st);
  }
});

document.addEventListener('change',function(e){
  if(e.target.dataset.action==='assign'){
    var uid=e.target.value;var postId=e.target.dataset.postId;
    if(uid&&postId){assignToPost(uid,postId);e.target.value='';}
  }
  if(e.target.dataset.action==='setzonecolor'){
    var zone=e.target.dataset.zone;var color=e.target.value;
    if(!S.zoneColors)S.zoneColors={};S.zoneColors[zone]=color;
    save();renderAll();
  }
});

document.addEventListener('click',function(e){
  var zpill=e.target.closest('.zpill');
  if(zpill){activeZone=zpill.dataset.z;renderBoard()}
});

// ── STATIC WIRING ─────────────────────────────────────
document.querySelectorAll('.tab').forEach(function(b){b.addEventListener('click',function(){showTab(b.dataset.tab)})});
document.getElementById('eventChip').addEventListener('click',function(){showTab('setup')});
document.getElementById('btnAddUnit').addEventListener('click',function(){openModal('addUnit')});
document.getElementById('btnBreakUnit').addEventListener('click',function(){
  if(!S.units.length)return;
  openModal('breakunit',S.units[0].id);
});
document.getElementById('btnAddPost').addEventListener('click',function(){showTab('setup')});
document.getElementById('btnAddUnitSetup').addEventListener('click',addUnit);
document.getElementById('btnAddPostSetup').addEventListener('click',addPost);
document.getElementById('btnAddResource').addEventListener('click',addResource);
document.getElementById('btnSaveEvent').addEventListener('click',function(){
  S.event.name=document.getElementById('s-evName').value.trim();
  S.event.date=document.getElementById('s-evDate').value;
  if(S.event.name)document.getElementById('eventChip').textContent='⚡ '+S.event.name;
  addLog('Event set: '+S.event.name);save();
});

// ── INIT ──────────────────────────────────────────────
(async function(){
  setSS('busy');await pull();
  if(!S.zoneColors)S.zoneColors={};
  if(!S.postOrder)S.postOrder=S.posts.map(function(p){return p.id});
  updateZones();renderAll();
})();
</script>
</body>
